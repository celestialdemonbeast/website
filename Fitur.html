<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <title>Celestial Demon Beast - Features</title>
  <link rel="icon" type="image/png" href="Asset/Logo [Dasar].png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Scripts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="Asset/Proses.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#0a0a0b',
            'dark-lighter': '#161618',
            accent: { primary: '#6366f1', secondary: '#a855f7' }
          },
          fontFamily: { sans: ['Outfit', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body { background-color: #0a0a0b; color: #e5e7eb; }
    .glass-card { 
      background: rgba(255, 255, 255, 0.03); 
      backdrop-filter: blur(10px); 
      border: 1px solid rgba(255, 255, 255, 0.05); 
      transition: all 0.3s ease; 
    }
    .text-gradient { 
      background: linear-gradient(to right, #818cf8, #c084fc); 
      -webkit-background-clip: text; 
      background-clip: text;
      -webkit-text-fill-color: transparent; 
    }
    .resource-card:hover {
      transform: translateY(-8px);
      border-color: rgba(99, 102, 241, 0.3);
      background: rgba(255, 255, 255, 0.06);
    }
  </style>
</head>

<body class="font-sans pt-20">
  <!-- Navbar -->
  <div id="navbar-placeholder"></div>
  <script type="module" src="Asset/load_navbar.js"></script>

  <main class="max-w-7xl mx-auto px-4 py-16">
    <div class="text-center mb-20 animate-fade-in">
      <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tight">POWERFUL <span class="text-gradient">FEATURES</span></h1>
      <p class="text-gray-400 max-w-2xl mx-auto">Kumpulan tools dan eksperimen digital kami untuk membantu produktivitasmu.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="resources-container">
      <!-- Resources will be loaded here via JS -->
    </div>
  </main>

  <script>
    const resources = [
      {
        "title": "Generator Widget waktu",
        "description": "Custom jam widget framework yang memungkinkan Anda membangun desain waktu langsung di markup.",
        "url": "https://feature-cdb.netlify.app/Time-Generator/Widget-Jam",
        "image": "https://feature-cdb.netlify.app/Asset/Date-Time.png"
      },
      {
        "title": "Livechat Youtube",
        "description": "Tampilan live chat ala YouTube responsif dengan avatar, nama pengguna, dan pesan bergulir.",
        "url": "https://feature-cdb.netlify.app/css-livechat-youtube",
        "image": "https://feature-cdb.netlify.app/Livechat%20Icon.png"
      },
      {
        "title": "Link to QR Code",
        "description": "Alat pembuat QR Code serbaguna untuk teks, tautan, atau data lainnya secara instan.",
        "url": "https://feature-cdb.netlify.app/qr/qr_code",
        "image": "https://feature-cdb.netlify.app/Asset/link to QR Code.png"
      },
      {
        "title": "Wifi to QR Code",
        "description": "Buat QR Code WiFi secara instan dan aman untuk rumah atau bisnis Anda.",
        "url": "https://feature-cdb.netlify.app/qr/wifi_qr.html",
        "image": "https://feature-cdb.netlify.app/Asset/wifi to QR Code.png"
      },
      {
        "title": "Calc-Net",
        "description": "Kalkulator IP Network, Binary, Satuan Data, Kecepatan, dan Kelistrikan.",
        "url": "https://feature-cdb.netlify.app/calcnet/menu.html",
        "image": "https://feature-cdb.netlify.app/Asset/Calcnet.png"
      },
      {
        "title": "PixPDF",
        "description": "Tools konversi file PDF menjadi gambar PNG dengan kualitas tinggi.",
        "url": "https://feature-cdb.netlify.app/Konverter/PixPDF.html",
        "image": "https://feature-cdb.netlify.app/Asset/PixPDF.png"
      }
    ];

    function createCard(resource) {
      return `
        <div class="resource-card glass-card rounded-[2rem] overflow-hidden flex flex-col group">
          <div class="h-52 bg-white/5 flex items-center justify-center p-8 transition-colors group-hover:bg-white/10">
            <img src="${resource.image}" alt="${resource.title}" class="max-h-full max-w-full object-contain filter drop-shadow-2xl transform group-hover:scale-110 transition-transform duration-500">
          </div>
          <div class="p-8 flex flex-col flex-1">
            <h3 class="text-2xl font-bold mb-3 text-white">${resource.title}</h3>
            <p class="text-gray-400 mb-8 flex-1 leading-relaxed">${resource.description}</p>
            <div class="flex items-center justify-between border-t border-white/5 pt-6">
              <span class="text-xs text-gray-500 font-mono truncate max-w-[50%]">${resource.url.replace(/^https?:\/\//, '')}</span>
              <a href="${resource.url}" target="_blank" class="px-6 py-2.5 bg-accent-primary hover:bg-accent-primary/90 text-white font-bold rounded-xl text-sm transition-all shadow-lg shadow-accent-primary/20">
                Kunjungi <i class="fa fa-external-link text-[10px] ml-1"></i>
              </a>
            </div>
          </div>
        </div>
      `;
    }

    function renderResources() {
      const container = document.getElementById('resources-container');
      resources.forEach(resource => {
        container.innerHTML += createCard(resource);
      });
    }

    document.addEventListener('DOMContentLoaded', renderResources);
  </script>

  <!-- Footer placeholder -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('Footer.html')
      .then(r => r.text())
      .then(d => document.getElementById('footer-placeholder').innerHTML = d);
  </script>
</body>
</html>
