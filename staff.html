<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <title>Celestial Demon Beast - Staff Team</title>
  <link rel="icon" type="image/png" href="Asset/Logo [Dasar].png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Scripts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="Asset/Proses.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#0a0a0b',
            'dark-lighter': '#161618',
            accent: { primary: '#6366f1', secondary: '#a855f7' }
          },
          fontFamily: { sans: ['Outfit', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body { background-color: #0a0a0b; color: #e5e7eb; }
    .glass-card { 
      background: rgba(255, 255, 255, 0.03); 
      backdrop-filter: blur(10px); 
      border: 1px solid rgba(255, 255, 255, 0.05); 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    .text-gradient { 
      background: linear-gradient(to right, #818cf8, #c084fc); 
      -webkit-background-clip: text; 
      background-clip: text;
      -webkit-text-fill-color: transparent; 
    }
    .staff-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: rgba(99, 102, 241, 0.3);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 20px 40px -20px rgba(99, 102, 241, 0.3);
    }
    .modal-overlay {
      background-color: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
    }
    .modal-content {
      background: #161618;
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: modalFadeUp 0.4s ease-out;
    }
    @keyframes modalFadeUp {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>

<body class="font-sans pt-20">
  <!-- Navbar -->
  <div id="navbar-placeholder"></div>

  <main class="max-w-7xl mx-auto px-4 py-16">
    <div class="text-center mb-20">
      <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tight">OUR AMAZING <span class="text-gradient">TEAM</span></h1>
      <p class="text-gray-400 max-w-2xl mx-auto">Para individu luar biasa yang menjaga dan membangun komunitas ini setiap harinya.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8" id="staff-container">
      <!-- Loading skeletons -->
      <div class="glass-card h-80 rounded-3xl animate-pulse"></div>
      <div class="glass-card h-80 rounded-3xl animate-pulse"></div>
      <div class="glass-card h-80 rounded-3xl animate-pulse"></div>
      <div class="glass-card h-80 rounded-3xl animate-pulse"></div>
    </div>
  </main>

  <!-- Staff Modal -->
  <div id="staff-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
    <div class="modal-overlay absolute inset-0 cursor-default" id="modal-backdrop"></div>
    <div class="modal-content relative w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl z-10">
      <button id="close-modal" class="absolute top-6 right-6 p-2 text-gray-400 hover:text-white transition-colors z-20">
        <i class="fa fa-xmark text-2xl"></i>
      </button>

      <div class="flex flex-col md:flex-row">
        <!-- Left Panel: Avatar -->
        <div class="w-full md:w-2/5 bg-white/5 p-10 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-white/5">
          <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-accent-primary to-accent-secondary rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
            <img id="modal-staff-image" src="" alt="Staff Member" class="relative w-40 h-40 rounded-full object-cover border-4 border-dark shadow-2xl">
          </div>
          <h3 id="modal-staff-username" class="text-2xl font-bold mt-6 text-white"></h3>
          <p id="modal-staff-nickname" class="text-accent-primary font-medium mt-1"></p>
        </div>

        <!-- Right Panel: Info -->
        <div class="w-full md:w-3/5 p-10">
          <h4 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-6">Staff Profile</h4>
          
          <div class="space-y-6">
            <div class="flex items-start gap-4">
              <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-accent-primary">
                <i class="fa fa-briefcase"></i>
              </div>
              <div>
                <p class="text-xs text-gray-500 font-bold uppercase mb-0.5">Posisi</p>
                <p id="modal-staff-position" class="text-white font-medium"></p>
              </div>
            </div>

            <div class="flex items-start gap-4">
              <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-accent-secondary">
                <i class="fa fa-wand-magic-sparkles"></i>
              </div>
              <div>
                <p class="text-xs text-gray-500 font-bold uppercase mb-0.5">Keahlian</p>
                <p id="modal-staff-skill" class="text-white font-medium leading-relaxed"></p>
              </div>
            </div>

            <div class="flex items-start gap-4">
              <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-indigo-400">
                <i class="fa fa-earth-asia"></i>
              </div>
              <div>
                <p class="text-xs text-gray-500 font-bold uppercase mb-0.5">Negara & Status</p>
                <p class="text-white font-medium">
                  <span id="modal-staff-country"></span> — <span id="modal-staff-status"></span>
                </p>
              </div>
            </div>
          </div>

          <div class="mt-10 pt-8 border-t border-white/5">
            <h4 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Sosial Media</h4>
            <div id="modal-staff-socials" class="flex flex-wrap gap-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://webdevcdb.github.io/API_SERVER_303076/010000110100010001000010/Staff_data.json";
    const DEFAULT_AVATAR = "https://webdevcdb.github.io/API_SERVER_303076/010000110100010001000010/Foto/CDB.gif";

    const staffContainer = document.getElementById("staff-container");
    const modal = document.getElementById('staff-modal');
    const closeModalBtn = document.getElementById('close-modal');
    const modalBackdrop = document.getElementById('modal-backdrop');

    async function renderStaffCards() {
      try {
        const response = await fetch(API_URL);
        const staffData = await response.json();

        staffContainer.innerHTML = "";
        staffData.forEach(staff => {
          const card = document.createElement('div');
          card.className = 'staff-card glass-card rounded-3xl p-8 text-center cursor-pointer flex flex-col items-center group';
          card.innerHTML = `
            <div class="relative mb-6">
              <div class="absolute -inset-1 bg-gradient-to-r from-accent-primary to-accent-secondary rounded-full blur opacity-0 group-hover:opacity-25 transition duration-500"></div>
              <img src="${staff.avatarUrl || DEFAULT_AVATAR}" alt="${staff.username}" class="relative w-32 h-32 rounded-full object-cover border-4 border-white/5">
            </div>
            <h3 class="text-xl font-bold text-white group-hover:text-accent-primary transition-colors">${staff.username || 'Unknown'}</h3>
            <p class="text-gray-500 font-medium mt-1 text-sm">${staff.position || 'N/A'}</p>
          `;
          card.addEventListener('click', () => openStaffModal(staff));
          staffContainer.appendChild(card);
        });
      } catch (error) {
        staffContainer.innerHTML = `<p class="col-span-full text-center text-red-400">Gagal memuat tim staff.</p>`;
      }
    }

    function openStaffModal(staff) {
      document.getElementById('modal-staff-image').src = staff.avatarUrl || DEFAULT_AVATAR;
      document.getElementById('modal-staff-username').textContent = staff.username || 'N/A';
      document.getElementById('modal-staff-nickname').textContent = staff.nickame ? `@${staff.nickame}` : '@unknown';
      document.getElementById('modal-staff-position').textContent = staff.position || 'N/A';
      document.getElementById('modal-staff-skill').textContent = staff.skill || 'N/A';
      document.getElementById('modal-staff-country').textContent = staff.country || 'N/A';
      document.getElementById('modal-staff-status').textContent = staff.status || 'N/A';

      const socialsContainer = document.getElementById('modal-staff-socials');
      socialsContainer.innerHTML = "";

      const socialLinks = {
        instagram: { icon: "fab fa-instagram" },
        twitter: { icon: "fab fa-twitter" },
        discord: { icon: "fab fa-discord" },
        github: { icon: "fab fa-github" },
        youtube: { icon: "fab fa-youtube" },
        website: { icon: "fas fa-globe" }
      };

      for (const key in socialLinks) {
        if (staff[key]) {
          const btn = document.createElement('a');
          btn.href = staff[key];
          btn.target = "_blank";
          btn.className = "w-10 h-10 bg-white/5 hover:bg-accent-primary text-white rounded-xl flex items-center justify-center transition-all transform hover:scale-110";
          btn.innerHTML = `<i class="${socialLinks[key].icon}"></i>`;
          socialsContainer.appendChild(btn);
        }
      }

      modal.classList.remove('hidden');
      modal.classList.add('flex');
      document.body.style.overflow = 'hidden';
    }

    function closeStaffModal() {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      document.body.style.overflow = 'auto';
    }

    closeModalBtn.addEventListener('click', closeStaffModal);
    modalBackdrop.addEventListener('click', closeStaffModal);
    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape" && !modal.classList.contains('hidden')) closeStaffModal();
    });

    document.addEventListener('DOMContentLoaded', renderStaffCards);
  </script>

  <!-- Footer placeholder -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('Footer.html')
      .then(r => r.text())
      .then(d => document.getElementById('footer-placeholder').innerHTML = d);
  </script>
</body>
</html>
