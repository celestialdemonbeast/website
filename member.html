<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <title>Celestial Demon Beast - Members</title>
  <link rel="icon" type="image/png" href="Asset/Logo [Dasar].png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Scripts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="Asset/Proses.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#0a0a0b',
            'dark-lighter': '#161618',
            accent: { primary: '#6366f1', secondary: '#a855f7' }
          },
          fontFamily: { sans: ['Outfit', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body { background-color: #0a0a0b; color: #e5e7eb; }
    .glass-card { 
      background: rgba(255, 255, 255, 0.03); 
      backdrop-filter: blur(10px); 
      border: 1px solid rgba(255, 255, 255, 0.05); 
      transition: all 0.3s ease; 
    }
    .text-gradient { 
      background: linear-gradient(to right, #818cf8, #c084fc); 
      -webkit-background-clip: text; 
      background-clip: text;
      -webkit-text-fill-color: transparent; 
    }
    .member-card:hover {
      transform: translateY(-5px);
      border-color: rgba(99, 102, 241, 0.3);
      background: rgba(255, 255, 255, 0.06);
    }
    .status-online { background-color: #10b981; }
    .status-idle { background-color: #f59e0b; }
    .status-dnd { background-color: #ef4444; }
  </style>
</head>

<body class="font-sans pt-20">
  <!-- Navbar -->
  <div id="navbar-placeholder"></div>
  <script type="module" src="Asset/load_navbar.js"></script>

  <main class="max-w-7xl mx-auto px-4 py-16">
    <div class="text-center mb-16">
      <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tight">ONLINE <span class="text-gradient">MEMBERS</span></h1>
      <p id="online-count" class="text-accent-primary font-bold tracking-widest uppercase text-sm mb-4">Mencari sinyal...</p>
      <p class="text-gray-400 max-w-2xl mx-auto">Anggota komunitas yang saat ini sedang aktif di markas besar kami.</p>
    </div>

    <!-- Staff Online -->
    <div class="mb-20">
      <div class="flex items-center gap-4 mb-8">
        <h2 class="text-2xl font-bold">STAFF ONLINE</h2>
        <div class="h-px flex-1 bg-white/5"></div>
      </div>
      <div id="staff-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <!-- Staff cards via JS -->
      </div>
    </div>

    <!-- Members Online -->
    <div>
      <div class="flex items-center gap-4 mb-8">
        <h2 class="text-2xl font-bold">CITIZENS ONLINE</h2>
        <div class="h-px flex-1 bg-white/5"></div>
      </div>
      <div id="member-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
        <!-- Member cards via JS -->
      </div>
    </div>
  </main>

  <script>
    async function fetchMembers() {
      try {
        const response = await fetch("https://discord.com/api/guilds/981206445875953724/widget.json");
        const data = await response.json();
        
        document.getElementById("online-count").innerText = `${data.presence_count} Pahlawan Sedang Aktif`;
        
        const staffList = document.getElementById("staff-list");
        const memberList = document.getElementById("member-list");
        
        staffList.innerHTML = "";
        memberList.innerHTML = "";
        
        data.members.forEach(member => {
          const statusClass = `status-${member.status || 'offline'}`;
          const card = document.createElement("div");
          card.className = "member-card glass-card p-6 rounded-2xl flex flex-col items-center text-center group";
          card.innerHTML = `
            <div class="relative mb-4">
              <img class="w-16 h-16 rounded-full object-cover border-2 border-white/5 group-hover:border-accent-primary transition-colors" src="${member.avatar_url}" alt="${member.username}" onerror="this.src='Asset/Logo [Dasar].png';">
              <div class="absolute bottom-0 right-0 w-4 h-4 rounded-full border-2 border-dark ${statusClass}"></div>
            </div>
            <h3 class="font-bold text-sm text-white truncate w-full">${member.username}</h3>
          `;
          
          // Using channel_id logic from original script
          if (member.channel_id === "1335210593824804964") {
            staffList.appendChild(card);
          } else {
            memberList.appendChild(card);
          }
        });
      } catch (error) {
        console.error("Error fetching member data:", error);
      }
    }
    document.addEventListener('DOMContentLoaded', fetchMembers);
  </script>

  <!-- Footer placeholder -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('Footer.html')
      .then(r => r.text())
      .then(d => document.getElementById('footer-placeholder').innerHTML = d);
  </script>
</body>
</html>
