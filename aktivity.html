<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <title>Celestial Demon Beast - Activity</title>
  <link rel="icon" type="image/png" href="Asset/Logo [Dasar].png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Scripts & Styles -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="App/Event/event-style.css">
  <script src="Asset/Proses.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#0a0a0b',
            'dark-lighter': '#161618',
            accent: { primary: '#6366f1', secondary: '#a855f7' }
          },
          fontFamily: { sans: ['Outfit', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body { background-color: #0a0a0b; color: #e5e7eb; }
    .glass-card { 
      background: rgba(255, 255, 255, 0.03); 
      backdrop-filter: blur(10px); 
      border: 1px solid rgba(255, 255, 255, 0.05); 
      transition: all 0.3s ease; 
    }
    .glass-card:hover { 
      background: rgba(255, 255, 255, 0.06); 
      border-color: rgba(99, 102, 241, 0.3); 
    }
    .text-gradient { 
      background: linear-gradient(to right, #818cf8, #c084fc); 
      -webkit-background-clip: text; 
      background-clip: text;
      -webkit-text-fill-color: transparent; 
    }
    
    /* Modern Overrides for Event System */
    .hero-banner {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 2rem;
      box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.3);
    }
    .category-btn {
      color: #9ca3af;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .category-btn.active {
      color: white;
      background: #6366f1;
      border-color: #6366f1;
    }
    .overlay {
        background-color: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(8px);
    }
    .detail-card {
        background: #161618;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 2rem;
        color: #e5e7eb;
    }
  </style>
</head>

<body class="font-sans pt-20">
  <!-- Navbar -->
  <div id="navbar-placeholder"></div>
  <script type="module" src="Asset/load_navbar.js"></script>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 py-12">
    <!-- Page Header -->
    <div class="text-center mb-16 animate-fade-in">
      <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tight">COMMUNITY <span class="text-gradient">ACTIVITIES</span></h1>
      <p class="text-gray-400 max-w-2xl mx-auto">Pantau terus kegiatan dan hari-hari besar di komunitas Celestial Demon Beast.</p>
    </div>

    <!-- Banner Hari Penting Hari Ini -->
    <section class="hero-banner p-8 md:p-12 mb-16 relative overflow-hidden group">
      <div class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
      <div class="relative z-10 flex flex-col md:flex-row items-center gap-10">
        <div class="flex-1 text-center md:text-left">
          <span class="inline-flex items-center gap-2 px-4 py-1 bg-white/20 rounded-full text-xs font-bold uppercase tracking-widest text-white">
            <i class="fas fa-star text-yellow-300"></i> Hari Penting Saat Ini
          </span>
          <h2 class="text-4xl md:text-5xl font-bold mt-6 text-white" id="todayTitle">Memuat...</h2>
          <p class="text-xl opacity-80 mt-2 font-medium" id="todayDate"></p>
          <p class="mt-6 text-indigo-100 max-w-2xl leading-relaxed text-lg" id="todayDescription"></p>
          <button id="todayDetailBtn" class="mt-8 inline-flex items-center gap-2 px-8 py-3 bg-white text-indigo-600 font-bold rounded-xl hover:bg-indigo-50 transition-all transform hover:scale-105 shadow-xl">
            Lihat Detail <i class="fas fa-arrow-right"></i>
          </button>
        </div>
        <div class="flex-shrink-0">
          <div class="bg-white/20 backdrop-blur-md rounded-full w-40 h-40 flex items-center justify-center border-4 border-white/30 shadow-2xl">
            <span class="text-7xl drop-shadow-lg" id="todayEmoji">📅</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Filters -->
    <div class="flex flex-wrap gap-3 justify-center mb-12">
      <button class="category-btn active px-6 py-2.5 rounded-full text-sm font-semibold transition-all hover:border-indigo-500/50" data-filter="all">
        <i class="fas fa-star mr-2 text-yellow-500"></i> Semua
      </button>
      <button class="category-btn px-6 py-2.5 rounded-full text-sm font-semibold transition-all hover:border-indigo-500/50" data-filter="nasional">
        <i class="fas fa-flag mr-2 text-red-500"></i> Nasional
      </button>
      <button class="category-btn px-6 py-2.5 rounded-full text-sm font-semibold transition-all hover:border-indigo-500/50" data-filter="keagamaan">
        <i class="fas fa-praying-hands mr-2 text-purple-500"></i> Keagamaan
      </button>
      <button class="category-btn px-6 py-2.5 rounded-full text-sm font-semibold transition-all hover:border-indigo-500/50" data-filter="internasional">
        <i class="fas fa-globe mr-2 text-blue-500"></i> Internasional
      </button>
      <button class="category-btn px-6 py-2.5 rounded-full text-sm font-semibold transition-all hover:border-indigo-500/50" data-filter="komunitas">
        <i class="fas fa-users mr-2 text-green-500"></i> Komunitas
      </button>
    </div>

    <!-- Event Grid -->
    <div id="eventGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Loading placeholders -->
      <div class="glass-card h-80 rounded-3xl animate-pulse"></div>
      <div class="glass-card h-80 rounded-3xl animate-pulse"></div>
      <div class="glass-card h-80 rounded-3xl animate-pulse"></div>
    </div>
  </main>

  <!-- Detail Overlay -->
  <div class="overlay fixed inset-0 z-[100] hidden items-center justify-center p-4 animate-fade-in" id="detailOverlay">
    <div class="detail-card w-full max-w-3xl max-h-[90vh] overflow-y-auto">
      <div class="p-8 md:p-12 relative">
        <button id="closeOverlay" class="absolute top-6 right-6 p-2 text-gray-400 hover:text-white transition-colors">
          <i class="fa fa-xmark text-2xl"></i>
        </button>
        
        <div class="flex flex-col md:flex-row justify-between items-start gap-6 border-b border-white/10 pb-8 mb-8">
          <div class="flex-1">
            <h2 class="text-3xl md:text-4xl font-bold bg-white text-transparent bg-clip-text" id="detailTitle">...</h2>
            <p class="text-xl text-indigo-400 font-bold mt-2" id="detailDate"></p>
            <div class="mt-6 flex flex-wrap gap-3">
              <span class="inline-flex items-center gap-2 px-4 py-1.5 bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 rounded-lg text-sm font-bold" id="detailCategory"></span>
              <span class="inline-flex items-center gap-2 px-4 py-1.5 bg-yellow-500/10 border border-yellow-500/20 text-yellow-400 rounded-lg text-sm font-bold" id="detailCountdown"></span>
            </div>
          </div>
          <div class="text-8xl bg-white/5 p-6 rounded-3xl shadow-inner" id="detailEmoji">📅</div>
        </div>
        
        <div class="space-y-10">
          <div>
            <h3 class="text-xl font-bold mb-4 flex items-center gap-3 text-white">
              <i class="fa fa-align-left text-indigo-500"></i> Deskripsi
            </h3>
            <p class="text-gray-400 text-lg leading-relaxed" id="detailDescription"></p>
          </div>
          
          <div>
            <h3 class="text-xl font-bold mb-4 flex items-center gap-3 text-white">
              <i class="fa fa-hourglass-half text-indigo-500"></i> Progres Waktu
            </h3>
            <div class="bg-white/5 h-4 w-full rounded-full overflow-hidden mb-3">
              <div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full rounded-full" id="progressFill"></div>
            </div>
            <p class="text-gray-400 font-medium" id="progressText"></p>
          </div>
          
          <div class="grid md:grid-cols-2 gap-8">
            <div class="glass-card p-6 rounded-2xl border-indigo-500/10">
              <h4 class="font-bold text-white mb-3 flex items-center gap-2 italic">
                <i class="fa fa-lightbulb text-yellow-400"></i> Fakta Menarik
              </h4>
              <p class="text-gray-400 leading-relaxed" id="detailFact"></p>
            </div>
            <div class="glass-card p-6 rounded-2xl border-purple-500/10">
              <h4 class="font-bold text-white mb-3 flex items-center gap-2 italic">
                <i class="fa fa-scroll text-purple-400"></i> Sejarah Singkat
              </h4>
              <p class="text-gray-400 leading-relaxed" id="detailHistory"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="App/Event/even_data.js"></script>
  <script src="App/Event/event_script.js"></script>
  
  <!-- Footer placeholder -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('Footer.html')
      .then(r => r.text())
      .then(d => document.getElementById('footer-placeholder').innerHTML = d);
  </script>
</body>
</html>
